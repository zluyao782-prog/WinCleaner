name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
        pip install -r requirements_unix.txt
        
    - name: Run Black (Code Formatting Check)
      run: |
        black --check --diff .
      continue-on-error: true
      
    - name: Run isort (Import Sorting Check)
      run: |
        isort --check-only --diff .
      continue-on-error: true
      
    - name: Run Flake8 (Linting)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
      
    - name: Check Python Syntax
      run: |
        python -m py_compile main.py
        find . -name "*.py" -path "./core/*" -exec python -m py_compile {} \;
        find . -name "*.py" -path "./ui/*" -exec python -m py_compile {} \;

  test-cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_unix.txt
        
    - name: Test imports
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        
        # Test core modules
        try:
            from core import engine, disk, process_mgr
            print('✅ Core modules import successful')
        except Exception as e:
            print(f'❌ Core modules import failed: {e}')
            sys.exit(1)
            
        # Test basic functionality
        try:
            from core.disk import get_disk_usage, format_size
            disks = get_disk_usage()
            print(f'✅ Disk analysis: Found {len(disks)} partitions')
            
            from core.process_mgr import get_system_performance
            perf = get_system_performance()
            print(f'✅ Process management: CPU {perf[\"cpu_percent\"]}%')
            
        except Exception as e:
            print(f'❌ Functionality test failed: {e}')
            sys.exit(1)
        "

  build-test-windows:
    runs-on: windows-latest
    needs: [code-quality]
    name: Build Test on Windows
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Test Windows-specific imports
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        
        try:
            from core.sysinfo import get_system_info, get_update_status
            from core.update_ctrl import get_update_service_status
            print('✅ Windows-specific modules import successful')
            
            # Test system info
            info = get_system_info()
            print(f'✅ System info: {info.get(\"os_name\", \"Unknown\")}')
            
            # Test update status
            status = get_update_status()
            print(f'✅ Update status: {status}')
            
        except Exception as e:
            print(f'❌ Windows functionality test failed: {e}')
            sys.exit(1)
        "
        
    - name: Create test build
      run: |
        mkdir logs
        pyinstaller --onefile --console ^
          --name WinCleaner-Test ^
          --add-data "config;config" ^
          --distpath test-dist ^
          main.py
      shell: cmd
      
    - name: Verify test build
      run: |
        if (Test-Path "test-dist\WinCleaner-Test.exe") {
          Write-Host "✅ Test build successful!"
          $size = (Get-Item "test-dist\WinCleaner-Test.exe").Length
          Write-Host "📊 Test build size: $([math]::Round($size/1MB, 2)) MB"
        } else {
          Write-Host "❌ Test build failed"
          exit 1
        }
      shell: powershell