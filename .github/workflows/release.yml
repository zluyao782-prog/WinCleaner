name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.1)'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write
  packages: write
  actions: write
  issues: write
  pull-requests: write

jobs:
  create-release:
    runs-on: windows-latest
    name: Create Release Package
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Get version
      id: get_version
      run: |
        if ("${{ github.event.inputs.version }}" -ne "") {
          $version = "${{ github.event.inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"
      shell: powershell
      
    - name: Update version info
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $versionNum = $version -replace '^v', ''
        $versionParts = $versionNum -split '\.'
        while ($versionParts.Length -lt 4) { $versionParts += "0" }
        $fileVersion = $versionParts -join ','
        
        # Update version_info.txt
        $content = Get-Content version_info.txt -Raw
        $content = $content -replace 'filevers=\([\d,]+\)', "filevers=($fileVersion)"
        $content = $content -replace 'prodvers=\([\d,]+\)', "prodvers=($fileVersion)"
        $content = $content -replace "u'FileVersion', u'[\d\.]+'", "u'FileVersion', u'$versionNum'"
        $content = $content -replace "u'ProductVersion', u'[\d\.]+'", "u'ProductVersion', u'$versionNum'"
        Set-Content version_info.txt $content
        
        Write-Host "Updated version to: $versionNum"
      shell: powershell
      
    - name: Create logs directory
      run: mkdir logs
      
    - name: Build WinCleaner
      run: |
        pyinstaller --onefile --windowed --uac-admin ^
          --name WinCleaner ^
          --add-data "config;config" ^
          --version-file version_info.txt ^
          --distpath dist ^
          --workpath build ^
          --specpath . ^
          --clean ^
          main.py
      shell: cmd
      
    - name: Verify build and get info
      id: build_info
      run: |
        if (Test-Path "dist\WinCleaner.exe") {
          Write-Host "Build successful!"
          $size = (Get-Item "dist\WinCleaner.exe").Length
          $sizeMB = [math]::Round($size/1MB, 2)
          Write-Host "File size: $sizeMB MB"
          echo "BUILD_SIZE=$sizeMB MB" >> $env:GITHUB_OUTPUT
          echo "BUILD_SUCCESS=true" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "Build failed - executable not found"
          echo "BUILD_SUCCESS=false" >> $env:GITHUB_OUTPUT
          exit 1
        }
      shell: powershell
      
    - name: Create release package
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $packageName = "WinCleaner_$version"
        
        # Create release directory
        New-Item -ItemType Directory -Path $packageName -Force
        
        # Copy executable
        Copy-Item "dist\WinCleaner.exe" "$packageName\"
        
        # Copy documentation
        Copy-Item "README.md" "$packageName\User-Guide.md"
        Copy-Item "发布说明.md" "$packageName\Release-Notes.md"
        
        # Create installation guide
        $buildSize = "${{ steps.build_info.outputs.BUILD_SIZE }}"
        $installGuide = @"
# WinCleaner $version Installation Guide

## Quick Start
1. Right-click WinCleaner.exe
2. Select "Run as administrator"
3. Click "Yes" in UAC prompt

## System Requirements
- Windows 10 (1903+) / Windows 11
- 64-bit system
- Administrator privileges

## Important Notes
- Administrator privileges required for full functionality
- Backup important data before use
- Disabling Windows updates may pose security risks

## Technical Support
For issues, see README.md or visit project homepage:
https://github.com/zluyao782-prog/WinCleaner

---
Version: $version
Build time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
File size: $buildSize
"@
        
        Set-Content "$packageName\Installation-Guide.txt" $installGuide -Encoding UTF8
        
        # Create ZIP package
        Compress-Archive -Path "$packageName\*" -DestinationPath "$packageName.zip"
        
        Write-Host "Release package created: $packageName.zip"
      shell: powershell
      
    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WinCleaner-Release-${{ steps.get_version.outputs.VERSION }}
        path: |
          WinCleaner_${{ steps.get_version.outputs.VERSION }}.zip
          dist/WinCleaner.exe
        retention-days: 90
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: WinCleaner ${{ steps.get_version.outputs.VERSION }}
        files: |
          WinCleaner_${{ steps.get_version.outputs.VERSION }}.zip
          dist/WinCleaner.exe
        body: |
          ## 🎉 WinCleaner ${{ steps.get_version.outputs.VERSION }} Release
          
          ### 📥 Download
          - **Complete Package**: `WinCleaner_${{ steps.get_version.outputs.VERSION }}.zip` (includes documentation)
          - **Executable Only**: `WinCleaner.exe`
          
          ### 🚀 Installation
          1. Download `WinCleaner.exe`
          2. Right-click and select "Run as administrator"
          3. Click "Yes" in UAC prompt
          
          ### ✨ Features
          - 🖥️ **System Information** - Real-time hardware info and performance monitoring
          - 🔄 **Windows Update Control** - Enable/disable automatic updates
          - 💾 **Disk Analysis** - Visualize disk usage and scan large files
          - 🗑️ **Smart Cleanup** - Clean WeChat, QQ, browser caches and more
          - ⚙️ **Process Management** - Monitor and manage system processes
          
          ### 📋 Requirements
          - Windows 10 (1903+) / Windows 11 (64-bit)
          - Administrator privileges
          - At least 50MB free disk space
          
          ### ⚠️ Important Notes
          - Administrator privileges required for full functionality
          - Backup important data before use
          - Disabling Windows updates may pose security risks
          
          ### 📊 Build Info
          - File size: ${{ steps.build_info.outputs.BUILD_SIZE }}
          - Build environment: Windows Server 2022
          - Python version: 3.11
          
          ---
          
          **⭐ If this project helps you, please give it a star!**
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}