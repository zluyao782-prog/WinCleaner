name: Build Windows Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create logs directory
      run: mkdir logs
      
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --uac-admin ^
          --name WinCleaner ^
          --add-data "config;config" ^
          --version-file version_info.txt ^
          --distpath dist ^
          --workpath build ^
          --specpath . ^
          --clean ^
          main.py
      shell: cmd
      
    - name: Verify build and get info
      id: build_info
      run: |
        if (Test-Path "dist\WinCleaner.exe") {
          Write-Host "Build successful!"
          $size = (Get-Item "dist\WinCleaner.exe").Length
          $sizeMB = [math]::Round($size/1MB, 2)
          Write-Host "File size: $sizeMB MB"
          echo "BUILD_SIZE=$sizeMB MB" >> $env:GITHUB_OUTPUT
          echo "BUILD_SUCCESS=true" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "Build failed - executable not found"
          echo "BUILD_SUCCESS=false" >> $env:GITHUB_OUTPUT
          exit 1
        }
      shell: powershell
      
    - name: Create release package
      run: |
        $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "${{ github.sha }}" }
        $packageName = "WinCleaner_$version"
        
        # Create release directory
        New-Item -ItemType Directory -Path $packageName -Force
        
        # Copy executable
        Copy-Item "dist\WinCleaner.exe" "$packageName\"
        
        # Copy documentation
        Copy-Item "README.md" "$packageName\User-Guide.md"
        if (Test-Path "发布说明.md") {
          Copy-Item "发布说明.md" "$packageName\Release-Notes.md"
        }
        
        # Create installation guide
        $buildSize = "${{ steps.build_info.outputs.BUILD_SIZE }}"
        $installGuide = @"
# WinCleaner $version Installation Guide

## Quick Start
1. Right-click WinCleaner.exe
2. Select "Run as administrator"
3. Click "Yes" in UAC prompt

## System Requirements
- Windows 10 (1903+) / Windows 11 (64-bit)
- Administrator privileges
- At least 50MB free disk space

## Important Notes
- Administrator privileges required for full functionality
- Backup important data before use
- Disabling Windows updates may pose security risks

## Technical Support
For issues, see User-Guide.md or visit:
https://github.com/zluyao782-prog/WinCleaner

---
Version: $version
Build time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
File size: $buildSize
Build environment: Windows Server 2022
Python version: 3.11
"@
        
        Set-Content "$packageName\Installation-Guide.txt" $installGuide -Encoding UTF8
        
        # Create ZIP package
        Compress-Archive -Path "$packageName\*" -DestinationPath "$packageName.zip"
        
        Write-Host "Release package created: $packageName.zip"
        Write-Host "Package contents:"
        Get-ChildItem $packageName | ForEach-Object { Write-Host "  - $($_.Name)" }
      shell: powershell
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WinCleaner-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
        path: |
          WinCleaner_${{ github.ref_type == 'tag' && github.ref_name || github.sha }}.zip
          dist/WinCleaner.exe
          README.md
          发布说明.md
        retention-days: 90
        
    - name: Build Summary
      run: |
        Write-Host "Build completed successfully!"
        Write-Host ""
        Write-Host "Artifacts uploaded:"
        Write-Host "  - WinCleaner.exe (executable)"
        Write-Host "  - WinCleaner_*.zip (complete package)"
        Write-Host "  - Documentation files"
        Write-Host ""
        Write-Host "To download:"
        Write-Host "  1. Go to Actions tab in GitHub"
        Write-Host "  2. Click on this workflow run"
        Write-Host "  3. Download artifacts from the bottom"
        Write-Host ""
        Write-Host "Version: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}"
        Write-Host "File size: ${{ steps.build_info.outputs.BUILD_SIZE }}"
      shell: powershell