name: Test GitHub Permissions

on:
  workflow_dispatch:
    inputs:
      test_version:
        description: 'Test version tag'
        required: true
        default: 'v1.0.4'

permissions:
  contents: write
  packages: write
  actions: write
  issues: write
  pull-requests: write

jobs:
  test-permissions:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test GitHub Token Permissions
      run: |
        echo "Testing GitHub token permissions..."
        echo "Repository: ${{ github.repository }}"
        echo "Actor: ${{ github.actor }}"
        echo "Event: ${{ github.event_name }}"
        
    - name: Create test file
      run: |
        echo "Test release content" > test-release.txt
        echo "Version: ${{ github.event.inputs.test_version }}" >> test-release.txt
        
    - name: Test Release Creation
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.test_version }}
        name: Test Release ${{ github.event.inputs.test_version }}
        files: test-release.txt
        body: |
          ## Test Release ${{ github.event.inputs.test_version }}
          
          This is a test release to verify GitHub Actions permissions.
          
          - Repository: ${{ github.repository }}
          - Actor: ${{ github.actor }}
          - Workflow: ${{ github.workflow }}
          
          If you see this release, the permissions are working correctly.
        draft: true
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}